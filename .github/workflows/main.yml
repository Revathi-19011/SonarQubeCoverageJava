name: Build nodejs application using github actions
on: 
  push:
    branches: 
      - master
  workflow_dispatch:
jobs:
  buildnodejs:
    continue-on-error: true
    strategy:
      matrix:
        node-version: [12, 16, 18, 20]
        operating-system: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.operating-system }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install nodejs of version ${{matrix.node-version}} and npm
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies  using npm
        run: npm install

      - name: Run tests using npm
        run: npm test
      
      - name: Build the application using npm
        run: npm run build
