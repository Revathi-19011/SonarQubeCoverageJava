name: CI for java project
on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    Test_java_code:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'
            
            - name: Test with maven
              run: mvn test
    Code_quality_java:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code/clone the repository on the runner
              uses: actions/checkout@v6

            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'
            
            - name: build code
              run: mvn package

            - name: Run sonarQube analysis
              run: mvn sonar:sonar -Dsonar.projectKey=sonar-demo-org-may26_sonar-demo-may26-project -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=sonar-demo-org-may26 -Dsonar.token=${{ secrets.SONAR_TOKEN }}
              
                
